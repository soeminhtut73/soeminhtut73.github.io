<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soe Min Htut — iOS Developer</title>
<meta name="description" content="iOS developer. Building SnapDoc and other native Apple apps.">
<style>
  :root {
    --bg: #15171a;
    --surface: #1b1e22;
    --border: #2a2d31;
    --text: #f4f4f2;
    --text-dim: #8a8f98;
    --accent: #3b82f6;
    --accent-dim: #1d4ed8;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 420px;
  }

  .mark {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: linear-gradient(155deg, var(--accent) 0%, var(--accent-dim) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    box-shadow: 0 8px 24px -8px rgba(59, 130, 246, 0.45);
  }

  .mark svg { width: 26px; height: 26px; }

  h1 {
    font-size: 26px;
    font-weight: 650;
    letter-spacing: -0.02em;
    margin: 0 0 6px;
    color: var(--text);
  }

  .role {
    font-size: 15px;
    color: var(--text-dim);
    margin: 0 0 28px;
    line-height: 1.5;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 12.5px;
    color: var(--text-dim);
    font-family: "SF Mono", ui-monospace, Menlo, monospace;
    margin-bottom: 32px;
    letter-spacing: 0.01em;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #34d399;
    box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.15);
  }

  .links {
    border-top: 1px solid var(--border);
  }

  .link-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 2px;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    transition: opacity 0.15s ease;
  }

  .link-row:hover { opacity: 0.7; }

  .link-main {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .link-title {
    font-size: 15px;
    font-weight: 500;
  }

  .link-sub {
    font-size: 13px;
    color: var(--text-dim);
  }

  .chevron {
    color: var(--text-dim);
    font-size: 14px;
    flex-shrink: 0;
    margin-left: 16px;
  }

  footer {
    margin-top: 40px;
    font-size: 12.5px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  footer a {
    color: var(--text-dim);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
  }

  footer a:hover { color: var(--text); border-color: var(--text-dim); }

  @media (prefers-reduced-motion: no-preference) {
    .card { animation: rise 0.5s ease both; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  }
</style>
</head>
<body>

  <div class="card">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 3h9l5 5v13a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M15 3v5h5" stroke="white" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M8 12.5h8M8 15.5h8M8 9.5h4" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>

    <h1>Soe Min Htut</h1>
    <p class="role">iOS developer based in Da Nang. Building native, on-device apps with Swift and UIKit.</p>

    <div class="status">
      <span class="dot"></span>
      Available for iOS development work
    </div>

    <nav class="links">
      <a class="link-row" href="https://soeminhtut73.github.io/snapdoc-support/">
        <span class="link-main">
          <span class="link-title">SnapDoc Support</span>
          <span class="link-sub">Help, FAQs, and contact</span>
        </span>
        <span class="chevron">→</span>
      </a>

      <a class="link-row" href="https://soeminhtut73.github.io/snapdoc-privacy/">
        <span class="link-main">
          <span class="link-title">SnapDoc Privacy Policy</span>
          <span class="link-sub">How your data is handled</span>
        </span>
        <span class="chevron">→</span>
      </a>

      <a class="link-row" href="mailto:codetosmh@gmail.com">
        <span class="link-main">
          <span class="link-title">Get in touch</span>
          <span class="link-sub">codetosmh@gmail.com</span>
        </span>
        <span class="chevron">→</span>
      </a>
    </nav>

    <footer>
      <span>© 2026 Soe Min Htut</span>
      <a href="https://github.com/soeminhtut73">GitHub ↗</a>
    </footer>
  </div>

</body>
</html>
